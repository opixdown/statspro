<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}'; img-src {{cspSource}} data:; font-src {{cspSource}};" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="{{cssUri}}" rel="stylesheet" />
  <title>StatsPro</title>
</head>
<body>
  <div class="crt">
    <div class="scanlines"></div>

    <header class="title">
      <span class="logo">STATSPRO</span>
      <span class="blink">▓</span>
    </header>

    <!-- character rides the top of the bar; left% is set from JS -->
    <div class="stage">
      <div class="character" id="character" data-state="idle">
        <div class="sprite">🧍</div>
        <div class="flames" id="flames"></div>
      </div>

      <div class="bar">
        <div class="fill" id="fill"></div>
        <div class="ticks" id="ticks"></div>
      </div>
      <div class="pct" id="pct">--%</div>
    </div>

    <!-- three configurable readouts -->
    <div class="slots">
      <div class="slot"><span class="val" id="slot0-val">--</span><span class="lab" id="slot0-lab">model</span></div>
      <div class="slot"><span class="val" id="slot1-val">--</span><span class="lab" id="slot1-lab">token</span></div>
      <div class="slot"><span class="val" id="slot2-val">--</span><span class="lab" id="slot2-lab">time left</span></div>
    </div>
  </div>

  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
