<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}'; img-src {{cspSource}} data:; font-src {{cspSource}};" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="{{cssUri}}" rel="stylesheet" />
  <title>StatsPro</title>
</head>
<body>
  <div class="hud">
    <div class="stage">
      <canvas id="game"></canvas>
      <span class="kills" id="kills">KILLS 000</span>
      <span class="pct" id="pct">--</span>
      <div class="banner" id="banner"></div>
      <div class="banner win" id="winbanner">STAGE&nbsp;CLEAR</div>
    </div>

    <div class="readouts">
      <span class="ro" id="slot0">--</span>
      <span class="ro mid" id="slot1">--</span>
      <span class="ro" id="slot2">--</span>
    </div>
  </div>

  {{assetsBoot}}
  {{localSprites}}
  <script nonce="{{nonce}}" src="{{skinUri}}"></script>
  <script nonce="{{nonce}}" src="{{spritesUri}}"></script>
  <script nonce="{{nonce}}" src="{{engineUri}}"></script>
  <script nonce="{{nonce}}" src="{{entitiesUri}}"></script>
  <script nonce="{{nonce}}" src="{{directorUri}}"></script>
  <script nonce="{{nonce}}" src="{{mainUri}}"></script>
</body>
</html>
